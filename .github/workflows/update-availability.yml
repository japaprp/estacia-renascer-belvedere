name: Update Availability

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Skip when secrets are missing
        if: ${{ secrets.GOOGLE_CALENDAR_API_KEY == '' || secrets.GOOGLE_CALENDAR_ID == '' }}
        run: |
          echo "Skipping update: configure GOOGLE_CALENDAR_API_KEY and GOOGLE_CALENDAR_ID in repository secrets."

      - name: Generate availability.json from Google Calendar
        if: ${{ secrets.GOOGLE_CALENDAR_API_KEY != '' && secrets.GOOGLE_CALENDAR_ID != '' }}
        env:
          GOOGLE_CALENDAR_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python scripts/update_availability.py

      - name: Commit and push if changed
        if: ${{ secrets.GOOGLE_CALENDAR_API_KEY != '' && secrets.GOOGLE_CALENDAR_ID != '' }}
        run: |
          if git diff --quiet -- availability.json; then
            echo "No changes in availability.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add availability.json
          git commit -m "chore: update availability data [skip ci]"
          git push
