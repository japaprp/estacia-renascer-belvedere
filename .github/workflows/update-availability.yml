name: Update Availability

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate availability.json from Google Calendar
        env:
          GOOGLE_CALENDAR_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CALENDAR_TIMEZONE: America/Sao_Paulo
        run: python scripts/update_availability.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- availability.json availability.js; then
            echo "No changes in availability artifacts"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add availability.json availability.js
          git commit -m "chore: update availability data [skip ci]"
          git push
